<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>رمز الدخول إلى لوحة إتقان</title>
  </head>
  <body style="font-family: Tahoma, Arial, sans-serif; background:#FAF6F0; margin:0; padding:32px; direction:rtl; text-align:right;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:560px; margin:0 auto; background:#fff; border:1px solid rgba(27,67,50,0.12); border-radius:14px; overflow:hidden;">
      <tr>
        <td style="padding:28px; direction:rtl; text-align:right;">
          <h1 style="margin:0 0 12px; font-size:22px; color:#1F2A24;">رمز الدخول إلى لوحة إتقان</h1>
          <p style="margin:0 0 16px; font-size:15px; line-height:1.85; color:#1F2A24;">
            رمزك للدخول:
          </p>
          <div style="margin:18px 0; padding:18px 20px; border:1px solid rgba(27,67,50,0.12); border-radius:10px; background:#F1EFE7; text-align:center;">
            <div style="font-size:28px; font-weight:700; color:#1B4332; font-family:Menlo, Consolas, monospace; letter-spacing:0.35em; direction:ltr;">{{ .Token }}</div>
          </div>
          <p style="margin:0; font-size:13.5px; color:#6B6B68; line-height:1.85;">
            صالح لمدة ٦٠ دقيقة. إن لم تطلبه فتجاهل هذه الرسالة.
          </p>
        </td>
      </tr>
    </table>
  </body>
</html>
